<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Popup Tool</title>

<style>

/* Container */
.imgcontainer{
  text-align:center;
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* Preview */
.preview{
  display:flex;
  justify-content:center;
}

.preview img{
  max-width:60%;
  border:6px solid #5c6bc0;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.preview img:hover{
  transform:scale(1.03);
}

/* Buttons */
.top-actions button,
.actions button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#5c6bc0;
  color:#fff;
  cursor:pointer;
}

.top-actions button:hover,
.actions button:hover{
  background:#3f51b5;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  z-index:99999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal-content{
  max-width:95vw;
  max-height:85vh;
  border:8px solid #fff;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:32px;
  cursor:pointer;
}

/* Loader */
#loader{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  color:#fff;
  font-size:20px;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999999;
}

</style>
</head>

<body>

<div class="imgcontainer">
<h2 id="title">{{ .Title }}</h2>

<div class="top-actions">
  <button onclick="openModal()">👁 View</button>
  <button onclick="downloadImg()">⬇️ Download</button>
  <button onclick="shareImg()">🔗 Share</button>
  <button onclick="printImg()">🖨️ Print</button>
</div>

<div class="preview">
  <img id="previewImg" src="{{ .Params.imagePoster | relURL }}" onclick="openModal()">
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">×</span>
  <img class="modal-content" id="modalImg">

  <div class="actions">
    <button onclick="downloadImg()">⬇️ Download</button>
    <button onclick="shareImg()">🔗 Share</button>
    <button onclick="printImg()">🖨️ Print</button>
  </div>
</div>

</div>

<!-- Loader -->
<div id="loader">
  <div id="loaderText">Loading...</div>
  <div id="progressText" style="margin-top:10px;font-size:16px;"></div>
</div>

<script>

let preview = document.getElementById("previewImg");
let modal = document.getElementById("modal");
let modalImg = document.getElementById("modalImg");

const loader = document.getElementById("loader");
const loaderText = document.getElementById("loaderText");
const progressText = document.getElementById("progressText");

// Loader functions
function showLoader(text="Loading..."){
  loader.style.display = "flex";
  loaderText.innerText = text;
  progressText.innerText = "";
}

function hideLoader(){
  loader.style.display = "none";
}

// Image load loader
showLoader("Image Loading...");

preview.onload = ()=> hideLoader();
preview.onerror = ()=> loaderText.innerText = "Image load failed ❌";

// Get current image
function getCurrentImage(){
  return {
    src: preview.src,
    title: document.getElementById("title").innerText || "poster"
  };
}

// Modal
function openModal(){
  if(!preview.src) return;
  modal.style.display = "flex";
  modalImg.src = preview.src;
}

function closeModal(){
  modal.style.display = "none";
}

// Close events
document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

modal.addEventListener("click", e=>{
  if(e.target===modal) closeModal();
});

// Download with progress
async function downloadImg(){
  const currentImage = getCurrentImage();

  showLoader("Downloading...");

  const response = await fetch(currentImage.src);
  const reader = response.body.getReader();
  const contentLength = +response.headers.get('Content-Length');

  let receivedLength = 0;
  let chunks = [];

  while(true){
    const {done, value} = await reader.read();
    if(done) break;

    chunks.push(value);
    receivedLength += value.length;

    if(contentLength){
      let percent = Math.floor((receivedLength / contentLength) * 100);
      progressText.innerText = percent + "% Downloaded";
    }else{
      progressText.innerText = "Downloading...";
    }
  }

  let blob = new Blob(chunks);
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = currentImage.title + ".gif";
  a.click();

  URL.revokeObjectURL(url);
  hideLoader();
}

// Share with loader
async function shareImg(){
  const currentImage = getCurrentImage();

  try{
    showLoader("Preparing for Share...");

    let res = await fetch(currentImage.src);
    let blob = await res.blob();

    let file = new File([blob], currentImage.title + ".gif", {
      type: blob.type
    });

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title: currentImage.title,
        files:[file]
      });
    }else{
      alert("Sharing not supported");
    }

  }catch(err){
    alert("Error sharing");
  }

  hideLoader();
}

// Print
function printImg(){
  const currentImage = getCurrentImage();

  closeModal();

  setTimeout(()=>{
    const printWindow = window.open('', '_blank');

    printWindow.document.write(`
      <html>
        <head>
          <title>${currentImage.title}</title>
          <style>
            body{margin:0;text-align:center;}
            img{max-width:100%;max-height:100vh;}
          </style>
        </head>
        <body>

          <img id="img" src="${currentImage.src}">

          <script>
            const img = document.getElementById("img");

            img.onload = function(){
              window.print();
              window.onafterprint = function(){
                window.close();
              };
              setTimeout(function(){
                window.close();
              },1500);
            };
          <\/script>

        </body>
      </html>
    `);

    printWindow.document.close();
  },0);
}

</script>

</body>
</html>
