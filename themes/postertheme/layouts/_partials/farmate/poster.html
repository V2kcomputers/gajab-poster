<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Popup Tool</title>

<style>

/* Container */
.imgcontainer{
  text-align:center;
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* Preview */
.preview{
  display:flex;
  justify-content:center;
}

.preview img{
  max-width:60%;
  border:6px solid #5c6bc0;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.preview img:hover{
  transform:scale(1.03);
}

/* Buttons */
.top-actions button,
.actions button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#5c6bc0;
  color:#fff;
  cursor:pointer;
}

.top-actions button:hover,
.actions button:hover{
  background:#3f51b5;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  z-index:99999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal-content{
  max-width:95vw;
  max-height:85vh;
  border:8px solid #fff;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:32px;
  cursor:pointer;
}
.skeleton{
  width:100%;
  height:200px;
  background:linear-gradient(
    90deg,
    #eee 25%,
    #ddd 37%,
    #eee 63%
  );
  background-size:400% 100%;
  animation:skeleton-loading 1.4s infinite;
  border-radius:10px;
}

@keyframes skeleton-loading{
  0%{background-position:100% 50%;}
  100%{background-position:0 50%;}
}
</style>
</head>

<body>

<div class="imgcontainer">
<h2 id="title">{{ .Title }}</h2>


<div class="top-actions">
 <a href="{{ with .Params.link }}{{ . }}{{ else }}https://yojnaportal.com/search?q={{ .Title | urlize }}{{ end }}" target="_blank">
  <button id="viewBtn">🔗 Link</button>
</a>
<button onclick="downloadImg(this)">⬇️ Download</button>
<button onclick="shareImg(this)">🔗 Share</button>
<button onclick="printImg(this)">🖨️ Print</button>
</div>

<div class="preview">
  <img id="previewImg" src="{{ .Params.imagePoster | relURL }}" onclick="openModal()">
</div>

<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">×</span>
  <img class="modal-content" id="modalImg">

  <div class="actions">
  <button onclick="downloadImg(this)">⬇️ Download</button>
<button onclick="shareImg(this)">🔗 Share</button>
<button onclick="printImg(this)">🖨️ Print</button>
  </div>
</div>

</div>

<script>
let preview = document.getElementById("previewImg");
let modal = document.getElementById("modal");
let modalImg = document.getElementById("modalImg");

function getCurrentImage(){
  return {
    src: preview.src,
    title: document.getElementById("title").innerText || "poster"
  };
}

// OPEN MODAL
function openModal(){
  modal.style.display = "flex";
  modalImg.src = preview.src;
}

// CLOSE
function closeModal(){
  modal.style.display = "none";
}

// ================= DOWNLOAD =================
async function downloadImg(btn){
  btn.innerText = "Waiting...";

  const img = getCurrentImage();

  try{
    let res = await fetch(img.src + "?t=" + Date.now());
    let blob = await res.blob();

    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = img.title + ".gif";
    a.click();

    URL.revokeObjectURL(url);

  }catch(e){
    alert("Download failed");
  }

  btn.innerText = "⬇️ Download";
}

// ================= SHARE =================
async function shareImg(btn){
  btn.innerText = "Sharing...";

  const img = {
    src: document.getElementById("previewImg").src,
    title: document.getElementById("title").innerText || "image"
  };

  try {
    const res = await fetch(img.src + "?t=" + Date.now());

    if (!res.ok) throw new Error("Fetch failed");

    const blob = await res.blob();

    const file = new File([blob], img.title + ".gif", {
      type: blob.type || "image/gif"
    });

    // ✅ ONLY FILE SHARE
    if (navigator.canShare && navigator.canShare({ files: [file] })) {

      await navigator.share({
        title: img.title,
        files: [file]
      });

    } else {
      alert("❌ आपका device file share support नहीं करता");
    }

  } catch (err) {
    console.error("Share Error:", err);
    alert("❌ Sharing failed");
  }

  btn.innerText = "🔗 Share";
}

// ================= PRINT =================
function printImg(btn){
  btn.innerText = "Preparing...";

  const img = getCurrentImage();

  const win = window.open("");

  win.document.write(`
    <html>
    <body style="margin:0;text-align:center;">
      <img src="${img.src}" style="max-width:100%;">
      <script>
        window.onload=function(){
          window.print();
          setTimeout(()=>window.close(),500);
        }
      <\/script>
    </body>
    </html>
  `);

  win.document.close();

  btn.innerText = "🖨️ Print";
}
</script>
<script>
    function renderGallery(filteredImages) {
  categoryContainer.innerHTML = '';

  const categories = [...new Set(filteredImages.map(img => img.category))];

  categories.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = "category";

    catDiv.innerHTML = `<h2>${cat}</h2><div class="gallery"></div>`;
    const container = catDiv.querySelector('.gallery');

    filteredImages
      .filter(img => img.category === cat)
      .forEach(img => {

        const item = document.createElement('div');
        item.className = "gallery-item";

        // skeleton
        const skeleton = document.createElement("div");
        skeleton.className = "skeleton";

        const image = document.createElement("img");
        image.loading = "lazy";
        image.src = img.src;
        image.style.display = "none";

        image.onload = () => {
          skeleton.remove();
          image.style.display = "block";
        };

        item.appendChild(skeleton);
        item.appendChild(image);

        const title = document.createElement("div");
        title.className = "image-title";
        title.innerText = img.title;

        item.appendChild(title);

        item.onclick = () => openModal(img);

        container.appendChild(item);
      });

    categoryContainer.appendChild(catDiv);
  });
}
</script>

</body>
</html>
