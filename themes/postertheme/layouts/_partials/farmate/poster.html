<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Popup Tool</title>

<style>
body {font-family:Arial;background:#f4f6fb;text-align:center;padding:20px;}

.imgcontainer{
  max-width:900px;
  margin:auto;
}

.preview img{
  max-width:60%;
  border:6px solid #5c6bc0;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}
.preview img:hover{transform:scale(1.03);}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#5c6bc0;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#3f51b5;}

/* Modal */
.modal{
  display:none;
  position:fixed;
  z-index:99999;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal-content{
  max-width:95vw;
  max-height:85vh;
  border:8px solid #fff;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:32px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="imgcontainer">

<h2 id="title">{{ .Title }}</h2>

<!-- TOP BUTTONS -->
<div>
<a href="{{ with .Params.link }}{{ . }}{{ else }}https://yojnaportal.com/search?q={{ .Title | urlize }}{{ end }}" target="_blank">
  <button>🔗 Link</button>
</a>

<button onclick="downloadImg(this)">⬇️ Download</button>
<button onclick="shareImg(this)">🔗 Share</button>
<button onclick="printImg(this)">🖨️ Print</button>
</div>

<!-- IMAGE -->
<div class="preview">
<img id="previewImg" src="{{ .Params.imagePoster | relURL }}" onclick="openModal()">
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="closeModal()">×</span>
<img class="modal-content" id="modalImg">

<div>
<button onclick="downloadImg(this)">⬇️ Download</button>
<button onclick="shareImg(this)">🔗 Share</button>
<button onclick="printImg(this)">🖨️ Print</button>
</div>
</div>

</div>

<script>

let preview = document.getElementById("previewImg");
let modal = document.getElementById("modal");
let modalImg = document.getElementById("modalImg");

// ✅ Get Image
function getCurrentImage(){
  return {
    src: preview.src,
    title: document.getElementById("title").innerText || "poster"
  };
}

// ✅ Modal
function openModal(){
  modal.style.display = "flex";
  modalImg.src = preview.src;
}
function closeModal(){
  modal.style.display = "none";
}

// Close on ESC
document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

// Close outside click
modal.addEventListener("click", e=>{
  if(e.target===modal) closeModal();
});

// ✅ DOWNLOAD
async function downloadImg(btn){
  btn.innerText = "Waiting...";

  const img = getCurrentImage();

  try{
    let res = await fetch(img.src + "?t=" + Date.now());
    let blob = await res.blob();

    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = img.title + ".gif";
    a.click();

    URL.revokeObjectURL(url);
  }catch(e){
    alert("Download failed");
  }

  btn.innerText = "⬇️ Download";
}

// ✅ SHARE
async function shareImg(btn){
  btn.innerText = "Sharing...";

  const img = getCurrentImage();

  try{
    let res = await fetch(img.src);
    let blob = await res.blob();

    let file = new File([blob], img.title + ".gif", {
      type: blob.type
    });

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title: img.title,
        files:[file]
      });
    }else{
      // fallback
      window.open(img.src, "_blank");
    }

  }catch(e){
    console.error(e);
    alert("Sharing failed");
  }

  btn.innerText = "🔗 Share";
}

// ✅ PRINT
function printImg(btn){
  btn.innerText = "Preparing...";

  const img = getCurrentImage();

  const win = window.open("");

  win.document.write(`
    <html>
    <head>
      <title>${img.title}</title>
      <style>
        body{text-align:center;margin:0;}
        img{max-width:100%;max-height:100vh;}
      </style>
    </head>
    <body>
      <img src="${img.src}">
      <script>
        window.onload = function(){
          window.print();
          setTimeout(()=>window.close(),500);
        }
      <\/script>
    </body>
    </html>
  `);

  win.document.close();

  btn.innerText = "🖨️ Print";
}

</script>

</body>
</html>
