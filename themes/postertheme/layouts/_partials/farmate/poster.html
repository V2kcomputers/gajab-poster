<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Popup Tool</title>

<style>
body {
  font-family: Arial;
  background:#f4f6fb;
  text-align:center;
  padding:20px;
}

.container {
  max-width:700px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

.preview img {
  max-width:100%;
  border:6px solid #5c6bc0;
  cursor:pointer;
}

/* ✅ MODAL FIX */
.modal {
  display:none;
  position:fixed;
  z-index:999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  overflow:auto;
}

/* ✅ IMAGE FULL VISIBLE */
.modal-content {
  max-width:95vw;
  max-height:85vh;
  object-fit:contain;
  border:8px solid #fff;
  border-radius:10px;
}

/* Close button */
.close {
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:32px;
  cursor:pointer;
}

/* Buttons */
.actions {
  margin-top:15px;
}

.actions button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#5c6bc0;
  color:#fff;
  cursor:pointer;
}

.actions button:hover {
  background:#3f51b5;
}
</style>
</head>

<body>

<div class="container">

<h2>{{.Title }}</h2>

<div class="preview">
  <!-- ✅ Hugo Dynamic Image -->
  <img id="previewImg" src="{{ .Params.imagePoster| relURL }}">
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

  <span class="close" onclick="closeModal()">×</span>

  <img class="modal-content" id="modalImg">

  <div class="actions">
    <button onclick="downloadImg()">⬇️ Download</button>
    <button onclick="shareImg()">🔗 Share</button>
    <button onclick="printImg()">🖨️ Print</button>
  </div>

</div>

<script>

let preview = document.getElementById("previewImg");
let modal = document.getElementById("modal");
let modalImg = document.getElementById("modalImg");

// Open Modal
preview.onclick = function(){
  if(!preview.src) return;
  modal.style.display = "flex";
  modalImg.src = preview.src;
}

// Close
function closeModal(){
  modal.style.display = "none";
}


// ⬇️ Download Latest Image (No Cache)
async function downloadImg(){
  let res = await fetch(preview.src + "?t=" + new Date().getTime());
  let blob = await res.blob();

  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "poster.png";
  a.click();

  URL.revokeObjectURL(url);
}


// 🔗 Share
async function shareImg(){
  let res = await fetch(preview.src);
  let blob = await res.blob();

  let file = new File([blob], "poster.png", {type: blob.type});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({
      title:"Poster",
      files:[file]
    });
  }else{
    alert("Sharing not supported on this device");
  }
}


// 🖨️ Print
function printImg(){
  let win = window.open("");
  win.document.write(`<img src="${preview.src}" style="width:100%">`);
  win.print();
}

</script>

</body>
</html>
